project_name: bcl6_recovery_perturbation

paths:
  seurat_rds: data/raw/post_cardiomyocyte.rds
  chip_targets_csv: data/raw/Bcl6_ChIP_target_P0.05.csv
  exported_meta_csv: data/processed/Cardiomyocyte_meta.csv
  exported_expression_csv: data/processed/Cardiomyocyte_SCT_scaled.txt
  exported_counts_csv: data/processed/Cardiomyocyte_RNA_counts.txt
  processed_dir: data/processed
  tables_dir: results/tables
  figures_dir: results/figures

metadata:
  condition_column: condition
  subtype_column: cm.subtype
  recovered_labels:
    - Rpre
    - Rpost
  nonrecovered_labels:
    - NRpre
    - NRpost
  donor_labels:
    - Donor

perturbation:
  gene: BCL6
  target_gene_candidates:
    - BCL6
    - Bcl6
    - bcl6
  evaluate_conditions:
    - Rpost
    - NRpost

features:
  min_target_genes: 20
  max_target_genes: 2000

classifier:
  test_size: 0.25
  random_state: 42
  max_iter: 2000

model_results:
  root: models
  standard_filename: standard_perturbation.csv
  manifest_csv: results/tables/model_result_manifest.csv
  quantification_prefix: model_quantification
  models:
    - name: CellOracle
      folder: models/CellOracle
      format: delta_expression
      native_candidates:
        - results/celloracle_bcl6_knockdown_delta.csv
        - results/celloracle_bcl6_native.h5ad
        - results/celloracle_bcl6_native.npz
    - name: scGPT
      folder: models/scGPT
      format: perturbed_expression
      native_candidates:
        - results/scgpt_bcl6_knockdown_expression.csv
        - results/scgpt_bcl6_native.h5ad
        - results/scgpt_bcl6_native.npz
    - name: Geneformer
      folder: models/Geneformer
      format: perturbed_expression
      ridge_alpha: 1.0
      native_candidates:
        - results/geneformer_bcl6_knockdown_expression.csv
        - results/geneformer_bcl6_native.npz
