name: bcl6-scgpt
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - scanpy
  - anndata
  - jupyter
  - ipykernel
  - pyyaml
  - tqdm
  - h5py
  # If on macOS / CPU only, drop the cuda packages and install pytorch from
  # `conda install pytorch::pytorch torchvision torchaudio -c pytorch`.
  - pytorch::pytorch
  - pytorch::torchvision
  - pip:
      - scgpt
      - cell-gears
      # scgpt also benefits from flash-attn but it requires CUDA + a manual install:
      #   pip install flash-attn==1.0.5 --no-build-isolation
      - wandb
