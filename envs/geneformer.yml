name: bcl6-geneformer
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - scanpy
  - anndata
  - jupyter
  - ipykernel
  - pyyaml
  - tqdm
  - h5py
  - pyarrow
  - pytorch::pytorch
  - pytorch::torchvision
  - pip:
      - transformers
      - datasets
      - accelerate
      - loompy
      # Geneformer is distributed via Hugging Face. The pip install pulls it directly.
      - git+https://huggingface.co/ctheodoris/Geneformer.git
      - mygene
